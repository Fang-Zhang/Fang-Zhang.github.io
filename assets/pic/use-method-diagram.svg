<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">USE Method: Utilization · Saturation · Errors</text>

  <!-- Resource box -->
  <rect x="30" y="90" width="180" height="90" rx="10" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="120" y="130" text-anchor="middle" font-size="18" fill="#1e1e1e">Resource</text>
  <text x="120" y="152" text-anchor="middle" font-size="13" fill="#333">CPU, Memory, Storage,</text>
  <text x="120" y="168" text-anchor="middle" font-size="13" fill="#333">GPU, Radio, Bus...</text>

  <!-- Arrows to three metric boxes -->
  <line x1="210" y1="110" x2="310" y2="70" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="210" y1="135" x2="310" y2="200" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="210" y1="160" x2="310" y2="330" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- Utilization -->
  <rect x="320" y="30" width="220" height="80" rx="10" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="430" y="60" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Utilization</text>
  <text x="430" y="82" text-anchor="middle" font-size="13" fill="#333">% time busy servicing work</text>
  <text x="430" y="100" text-anchor="middle" font-size="13" fill="#333">e.g. CPU busy %, I/O busy %</text>

  <!-- Saturation -->
  <rect x="320" y="160" width="220" height="80" rx="10" fill="#ffd8a8" stroke="#1e1e1e" stroke-width="2"/>
  <text x="430" y="190" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Saturation</text>
  <text x="430" y="212" text-anchor="middle" font-size="13" fill="#333">extra queued work</text>
  <text x="430" y="230" text-anchor="middle" font-size="13" fill="#333">e.g. run-queue, I/O wait queue</text>

  <!-- Errors -->
  <rect x="320" y="290" width="220" height="80" rx="10" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2"/>
  <text x="430" y="320" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Errors</text>
  <text x="430" y="342" text-anchor="middle" font-size="13" fill="#333">count of error events</text>
  <text x="430" y="360" text-anchor="middle" font-size="13" fill="#333">e.g. dropped packets, OOM kills</text>

  <!-- Right side: outcome -->
  <line x1="540" y1="70" x2="620" y2="150" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="200" x2="620" y2="170" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="330" x2="620" y2="200" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="630" y="130" width="230" height="100" rx="10" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="745" y="160" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Bottleneck</text>
  <text x="745" y="182" text-anchor="middle" font-size="13" fill="#333">Identified systemically,</text>
  <text x="745" y="200" text-anchor="middle" font-size="13" fill="#333">before guessing at fixes</text>
  <text x="745" y="218" text-anchor="middle" font-size="13" fill="#333">(no random tuning)</text>

  <text x="450" y="405" text-anchor="middle" font-size="13" fill="#757575">Checked for every resource in the system, per Brendan Gregg's USE Method</text>
</svg>
